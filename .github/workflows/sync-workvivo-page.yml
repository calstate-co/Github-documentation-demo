name: Sync README To Workvivo

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/sync_readme_to_workvivo.py
      - .github/workflows/sync-workvivo-page.yml

permissions:
  contents: read

jobs:
  sync-workvivo-page:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync README to Workvivo page
        env:
          WORKVIVO: ${{ secrets.WORKVIVO }}
          WORKVIVO_ID: ${{ secrets.WORKVIVO_ID }}
          WORKVIVO_API_BASE: "https://api.workvivo.us/v1"
          WORKVIVO_PAGE_ID: "76239"
          WORKVIVO_SPACE_ID: "23244"
          WORKVIVO_PAGE_SUBTITLE: "Mirrored from GitHub README"
        run: python scripts/sync_readme_to_workvivo.py
