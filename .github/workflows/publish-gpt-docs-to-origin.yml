name: Publish GPT Docs To Origin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - WORKVIVO_SYNC_OVERVIEW.md
      - .github/workflows/publish-gpt-docs-to-origin.yml

permissions:
  contents: read

jobs:
  publish-gpt-docs:
    runs-on: ubuntu-latest
    env:
      ORIGIN_REPO_TOKEN: ${{ secrets.ORIGIN_REPO_TOKEN }}

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Skip when origin token is not configured
        if: env.ORIGIN_REPO_TOKEN == ''
        run: echo "ORIGIN_REPO_TOKEN is not configured. Skipping publish."

      - name: Check out target repository
        if: env.ORIGIN_REPO_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: mattjhughes/all-about-github
          token: ${{ env.ORIGIN_REPO_TOKEN }}
          path: origin-repo

      - name: Copy GPT-facing docs
        if: env.ORIGIN_REPO_TOKEN != ''
        run: |
          mkdir -p origin-repo/gpt-data/github-documentation-demo
          cp README.md origin-repo/gpt-data/github-documentation-demo/README.md
          cp WORKVIVO_SYNC_OVERVIEW.md origin-repo/gpt-data/github-documentation-demo/WORKVIVO_SYNC_OVERVIEW.md

      - name: Commit and push if changed
        if: env.ORIGIN_REPO_TOKEN != ''
        run: |
          cd origin-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- gpt-data/github-documentation-demo; then
            echo "No GPT docs changes to publish."
            exit 0
          fi

          git add gpt-data/github-documentation-demo
          git commit -m "Sync GPT docs from calstate-co/Github-documentation-demo"
          git push origin HEAD:main
